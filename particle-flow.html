<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#010403" />
    <title>Accent Auto GPGPU Particle Flow</title>
  </head>
  <body>
    <main id="app">
      <canvas id="experience-canvas" aria-label="Hyundai Accent otomatik GPU parçacık akışı"></canvas>
      <div class="noise" aria-hidden="true"></div>
      <section id="ad-creative" class="ad-creative" aria-label="Hyundai Accent otomatik GPU reklamı">
        <span class="ad-disclosure">REKLAM</span>
        <span class="ad-copy">
          <small>HYUNDAI DIGITAL SHOWROOM</small>
          <strong>ACCENT</strong>
          <span class="ad-line">AUTO PARTICLE FLOW</span>
        </span>
        <span class="ad-meta">AUTO GPGPU PARTICLE SYSTEM</span>
      </section>
      <section id="loading" class="loading-panel" aria-live="polite">
        <div class="reticle" aria-hidden="true"><span></span></div>
        <p class="eyebrow" id="stage-label">LOADING GPGPU FIELD</p>
        <div class="progress-row">
          <div class="progress-track"><i id="progress-bar"></i></div>
          <output id="progress-value">00</output>
        </div>
        <p class="loading-note">AUTO GPU FLOW / CONTINUOUS</p>
      </section>
    </main>
    <script type="module" src="/src/particle-lab.ts"></script>
  </body>
</html>
