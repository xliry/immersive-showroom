<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#020705">
    <title>Accent — Gaussian Motion Selector</title>
    <style>
      :root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#edf7f1;background:#020705}*{box-sizing:border-box}
      html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#020705}.shell{display:grid;grid-template-columns:310px minmax(0,1fr);height:100%}
      aside{position:relative;z-index:2;padding:30px 22px;border-right:1px solid #173126;background:linear-gradient(145deg,#06120d,#020705 66%);overflow:auto}.kicker{margin:0 0 12px;color:#58ed9e;font:700 9px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.2em}
      h1{margin:0 0 27px;font-size:31px;line-height:.95;letter-spacing:-.045em;font-weight:620}.list{display:grid;gap:7px}.motion{width:100%;padding:13px 13px;text-align:left;border:1px solid #173126;background:rgba(1,8,5,.4);color:#758a80;cursor:pointer;transition:.2s}
      .motion:hover,.motion.is-active{border-color:#4ecf8b;color:#f1fff7;background:rgba(18,62,42,.33)}.motion span{display:block;color:#58ed9e;font:700 9px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.18em}.motion strong{display:block;margin-top:6px;font-size:13px;font-weight:580}.motion small{display:block;margin-top:4px;font-size:9px;letter-spacing:.08em;color:#687b72}
      .footer{margin-top:22px;color:#52645b;font-size:10px;line-height:1.55}.open{display:inline-block;margin-top:15px;color:#d9eee3;text-decoration:none;font:700 9px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.14em}.open:after{content:' ↗';color:#58ed9e}
      .stage{position:relative;min-width:0;background:#010403}.stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#010403}.tag{position:absolute;z-index:3;right:18px;bottom:16px;padding:7px 9px;border:1px solid rgba(78,207,139,.32);background:rgba(1,8,5,.72);color:#83a393;font:700 8px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.14em;pointer-events:none}
      @media(max-width:760px){html,body{overflow:auto}.shell{display:block;height:auto}.stage{height:62vh;min-height:420px}.list{grid-template-columns:repeat(2,minmax(0,1fr))}aside{border-right:0;border-bottom:1px solid #173126;padding:22px 14px}.motion{padding:11px}h1{font-size:26px;margin-bottom:20px}}
    </style>
  </head>
  <body>
    <main class="shell">
      <aside>
        <p class="kicker">ACCENT / REAL GAUSSIAN SPLAT</p><h1>6 LIVE<br>MOTION FIELDS</h1>
        <div class="list">
          <button class="motion is-active" data-variant="1"><span>01</span><strong>Ribbon Flow</strong><small>İKİ YÜZEY ŞERİDİ</small></button>
          <button class="motion" data-variant="2"><span>02</span><strong>Breathing Cloud</strong><small>HACİMSEL NEFES</small></button>
          <button class="motion" data-variant="3"><span>03</span><strong>Energy Scanner</strong><small>BURUNDAN KUYRUĞA TARAMA</small></button>
          <button class="motion" data-variant="4"><span>04</span><strong>Vortex Drift</strong><small>DÖNEN GİRDAP ALANI</small></button>
          <button class="motion" data-variant="5"><span>05</span><strong>Twin Current</strong><small>KARŞIT ÇİFT AKIŞ</small></button>
          <button class="motion" data-variant="6"><span>06</span><strong>Storm Assemble</strong><small>DAĞIL / TOPARLAN</small></button>
        </div>
        <p class="footer">Aynı 379.981 gerçek Gaussian splat. Yalnızca hareket fiziği değişiyor.</p>
        <a id="open-full" class="open" href="/splat-v1.html">TAM EKRAN AÇ</a>
      </aside>
      <section class="stage"><iframe id="preview" src="/?ad=1&splash-lab=1&splat-motion=1" title="Gaussian hareket canlı önizleme"></iframe><span class="tag">LIVE / ONE FIELD AT A TIME</span></section>
    </main>
    <script>
      const frame=document.querySelector('#preview');const full=document.querySelector('#open-full');
      document.querySelectorAll('.motion').forEach(button=>button.addEventListener('click',()=>{
        const variant=button.dataset.variant;document.querySelectorAll('.motion').forEach(item=>item.classList.toggle('is-active',item===button));
        frame.src='/?ad=1&splash-lab=1&splat-motion='+variant;full.href='/splat-v'+variant+'.html';
      }));
    </script>
  </body>
</html>
